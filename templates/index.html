<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Client</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #111;
            --surface: #1c1c1c;
            --surface2: #252525;
            --border: #333;
            --text: #e8e8e8;
            --muted: #888;
            --accent: #4f8ef7;
            --accent-hover: #6aa0ff;
            --danger: #e05252;
            --success: #4caf78;
            --warning: #e0a040;
            --radius: 10px;
            --radius-sm: 6px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Screens ── */
        .screen { display: none; }
        .screen.active { display: flex; }

        /* ── Auth Screen ── */
        #screen-auth {
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 380px;
        }
        .auth-logo {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .auth-sub {
            text-align: center;
            color: var(--muted);
            margin-bottom: 28px;
            font-size: 13px;
        }
        .tab-row {
            display: flex;
            gap: 4px;
            background: var(--surface2);
            padding: 4px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
        }
        .tab-btn {
            flex: 1;
            padding: 7px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }
        .tab-btn.active {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 5px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .form-group input {
            width: 100%;
            padding: 9px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-group input:focus { border-color: var(--accent); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s, opacity 0.15s, transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover:not(:disabled) { background: #5dbf8a; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #ec6262; }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover:not(:disabled) { background: var(--border); }
        .btn-full { width: 100%; }

        .error-msg {
            background: rgba(224, 82, 82, 0.12);
            border: 1px solid rgba(224, 82, 82, 0.35);
            color: #f08080;
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            font-size: 12px;
            margin-top: 14px;
            display: none;
        }
        .error-msg.visible { display: block; }

        /* ── Lobby / Matches Screen ── */
        #screen-matches {
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .topbar-brand { font-weight: 700; font-size: 16px; }
        .topbar-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--muted);
        }
        .user-badge span { color: var(--accent); font-weight: 600; }
        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }
        .ws-dot.connected { background: var(--success); }

        .matches-layout {
            display: grid;
            grid-template-columns: 1fr 220px;
            gap: 0;
            flex: 1;
            overflow: hidden;
        }
        .matches-main {
            padding: 20px;
            overflow-y: auto;
        }
        .matches-sidebar {
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .match-list { display: flex; flex-direction: column; gap: 8px; }
        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: border-color 0.15s;
        }
        .match-card:hover { border-color: #555; }
        .match-card.in-lobby {
            border-color: var(--accent);
            background: rgba(79, 142, 247, 0.06);
        }
        .match-card.in-game {
            border-color: var(--success);
            background: rgba(76, 175, 120, 0.06);
        }
        .match-info { flex: 1; min-width: 0; }
        .match-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 3px;
        }
        .match-meta {
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .badge {
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .badge-waiting { background: rgba(224, 160, 64, 0.15); color: var(--warning); }
        .badge-lobby { background: rgba(79, 142, 247, 0.15); color: var(--accent); }
        .badge-active { background: rgba(76, 175, 120, 0.15); color: var(--success); }
        .badge-ended { background: rgba(136, 136, 136, 0.15); color: var(--muted); }

        .match-actions { display: flex; gap: 6px; flex-shrink: 0; }

        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 48px 20px;
            font-size: 13px;
        }

        /* ── Lobby Room Screen ── */
        #screen-lobby {
            flex-direction: column;
            min-height: 100vh;
        }
        .lobby-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 24px;
        }
        .lobby-room {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            width: 100%;
            max-width: 460px;
        }
        .lobby-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .lobby-subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
        .players-list { margin-bottom: 24px; }
        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }
        .player-row:last-child { border-bottom: none; }
        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            flex-shrink: 0;
        }
        .player-name { font-weight: 500; font-size: 13px; }
        .player-you {
            font-size: 10px;
            color: var(--muted);
            margin-left: auto;
            background: var(--surface2);
            padding: 2px 7px;
            border-radius: 20px;
        }
        .lobby-log {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            height: 90px;
            overflow-y: auto;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .log-entry { display: flex; gap: 6px; }
        .log-entry .log-name { color: var(--accent); font-weight: 500; }
        .log-entry .log-join { color: var(--success); }
        .log-entry .log-leave { color: var(--danger); }
        .lobby-actions { display: flex; gap: 8px; }

        /* ── Game Screen ── */
        #screen-game {
            flex-direction: column;
            min-height: 100vh;
        }
        .game-topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .game-stat {
            font-size: 11px;
            color: var(--muted);
        }
        .game-stat span { color: var(--text); font-weight: 600; }
        .game-divider {
            width: 1px;
            height: 18px;
            background: var(--border);
        }
        .game-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .ctrl-label { font-size: 11px; color: var(--muted); }
        .ctrl-input {
            width: 50px;
            padding: 4px 7px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }
        .ctrl-input:focus { border-color: var(--accent); }
        canvas {
            flex: 1;
            display: block;
            cursor: crosshair;
            background: var(--bg);
        }
        #game-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            display: none;
            z-index: 10;
        }
        #game-overlay.visible { display: flex; }
        #game-overlay-title { font-size: 24px; font-weight: 700; }
        #game-overlay-sub { color: var(--muted); font-size: 14px; }
        #screen-game { position: relative; }

        /* ── Toast ── */
        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 999;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 12px;
            max-width: 280px;
            animation: slideIn 0.2s ease;
        }
        .toast.info { border-left: 3px solid var(--accent); }
        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }
        .toast.warning { border-left: 3px solid var(--warning); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<!-- ═══════════ AUTH SCREEN ═══════════ -->
<div id="screen-auth" class="screen active">
    <div class="auth-card">
        <div class="auth-logo">⚔ StrategyGame</div>
        <div class="auth-sub">Multiplayer real-time strategy</div>

        <div class="tab-row">
            <button class="tab-btn active" onclick="switchTab('login')">Войти</button>
            <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
        </div>

        <div id="tab-login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="example@gmail.com" value="example@gmail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="login-password" placeholder="••••••••" value="1234">
            </div>
            <button class="btn btn-primary btn-full" id="btn-login" onclick="doLogin()">Войти</button>
        </div>

        <div id="tab-register" style="display:none;">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="reg-username" placeholder="YourNickname">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="example@gmail.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary btn-full" id="btn-register" onclick="doRegister()">Создать аккаунт</button>
        </div>

        <div class="error-msg" id="auth-error"></div>
    </div>
</div>

<!-- ═══════════ MATCHES SCREEN ═══════════ -->
<div id="screen-matches" class="screen">
    <div class="topbar">
        <div class="topbar-brand">⚔ StrategyGame</div>
        <div class="topbar-user">
            <div class="ws-dot" id="ws-dot"></div>
            <div class="user-badge">Игрок: <span id="display-username">-</span></div>
            <button class="btn btn-ghost" onclick="doLogout()">Выйти</button>
        </div>
    </div>
    <div class="matches-layout">
        <div class="matches-main">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                <div class="section-title">Список матчей</div>
                <div>
                    <button class="btn btn-success" onclick="loadMatches()">Обновить</button>
                    <button class="btn btn-success" onclick="doCreateMatch()">+ Создать матч</button>
                </div>
            </div>
            <div id="matches-list" class="match-list">
                <div class="empty-state">Загрузка матчей…</div>
            </div>
        </div>
        <div class="matches-sidebar">
            <div>
                <div class="section-title">События</div>
                <div id="event-log" style="display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--muted);">
                    <div>Нет событий</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════ LOBBY SCREEN ═══════════ -->
<div id="screen-lobby" class="screen">
    <div class="topbar">
        <div class="topbar-brand">⚔ StrategyGame</div>
        <div class="topbar-user">
            <div class="ws-dot connected" id="ws-dot-lobby"></div>
            <div class="user-badge">Игрок: <span id="lobby-username">-</span></div>
        </div>
    </div>
    <div class="lobby-content">
        <div class="lobby-room">
            <div class="lobby-title">Лобби матча <span id="lobby-match-id" style="color:var(--accent)"></span></div>
            <div class="lobby-subtitle">Ожидание игроков…</div>

            <div class="section-title">Участники</div>
            <div id="players-list" class="players-list"></div>

            <div class="section-title" style="margin-top:16px;">Лог событий</div>
            <div id="lobby-log" class="lobby-log"></div>

            <div class="lobby-actions">
                <button class="btn btn-success" id="btn-start" onclick="doStartMatch()" style="flex:1;">▶ Начать матч</button>
                <button class="btn btn-ghost" onclick="doLeaveMatchLobby()">Покинуть</button>
            </div>
        </div>
    </div>
</div>

<!-- ═══════════ GAME SCREEN ═══════════ -->
<div id="screen-game" class="screen">
    <div class="game-topbar">
        <div class="game-stat">Матч: <span id="g-match-id">-</span></div>
        <div class="game-divider"></div>
        <div class="game-stat">WS: <span id="g-ws">●</span></div>
        <div class="game-divider"></div>
        <div class="game-stat">TPS: <span id="g-tps">-</span></div>
        <div class="game-divider"></div>
        <div class="game-controls">
            <span class="ctrl-label">Узел:</span>
            <input type="number" class="ctrl-input" id="g-node-id" value="1">
            <span class="ctrl-label">→</span>
            <input type="number" class="ctrl-input" id="g-target-id" value="2">
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="gChangeType(1)">Производство</button>
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="gChangeType(2)">Крепость</button>
            <button class="btn btn-primary" style="padding:4px 10px;font-size:11px;" onclick="gDispatch()">Послать армию (10)</button>
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="gAlways(true)">Auto ON</button>
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="gAlways(false)">Auto OFF</button>
            <button class="btn btn-danger" style="padding:4px 10px;font-size:11px;margin-left:8px;" onclick="goToMatches()">← Выйти</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="game-overlay">
        <div id="game-overlay-title">Матч завершён</div>
        <div id="game-overlay-sub">Игра окончена</div>
        <button class="btn btn-primary" onclick="goToMatches()">← Вернуться к матчам</button>
    </div>
</div>

<!-- ═══════════ TOAST ═══════════ -->
<div id="toast-container"></div>

<script>
    const BASE = 'localhost:8080';
    let token = localStorage.getItem('token');
    let myUsername = null;
    let myUserId = null;
    let socket = null;
    let currentMatchId = null;
    let currentLobbyPlayers = [];
    let gameState = { nodes: {}, node_edges: [] };

    if (token !== null) {
        afterLogin()
    }

    // ── Helpers ────────────────────────────────────────────────────
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
    }

    function toast(msg, type = 'info', duration = 3000) {
        const c = document.getElementById('toast-container');
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = msg;
        c.appendChild(el);
        setTimeout(() => el.remove(), duration);
    }

    function logEvent(msg, color = 'var(--muted)') {
        const log = document.getElementById('event-log');
        if (log.firstElementChild && log.firstElementChild.textContent === 'Нет событий') {
            log.innerHTML = '';
        }
        const el = document.createElement('div');
        el.style.color = color;
        el.style.fontSize = '11px';
        el.style.lineHeight = '1.4';
        el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.prepend(el);
        if (log.children.length > 50) log.lastChild.remove();
    }

    function addLobbyLog(msg, cls = '') {
        const log = document.getElementById('lobby-log');
        const el = document.createElement('div');
        el.className = 'log-entry';
        const t = document.createElement('span');
        t.style.color = 'var(--muted)';
        t.textContent = new Date().toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) + '  ';
        const m = document.createElement('span');
        m.className = cls;
        m.textContent = msg;
        el.appendChild(t);
        el.appendChild(m);
        log.appendChild(el);
        log.scrollTop = log.scrollHeight;
    }

    async function api(method, path, body, auth = true) {
        const opts = {
            method,
            headers: { 'Content-Type': 'application/json' }
        };
        if (auth) opts.headers['Authorization'] = `Bearer ${token}`;
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(`http://${BASE}${path}`, opts);
        if (!r.ok) {
            const e = await r.text().catch(() => r.statusText);
            throw new Error(e || r.statusText);
        }
        return r.json().catch(() => null);
    }

    // ── Auth ───────────────────────────────────────────────────────
    function switchTab(tab) {
        document.getElementById('tab-login').style.display = tab === 'login' ? '' : 'none';
        document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        document.getElementById('auth-error').classList.remove('visible');
    }

    async function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-password').value;
        const btn = document.getElementById('btn-login');
        btn.disabled = true; btn.textContent = 'Входим…';
        try {
            const d = await api('POST', '/auth/login', { email, password: pass }, false);
            token = d.token;
            localStorage.setItem('token', token)
            afterLogin();
        } catch(e) {
            showAuthError(e.message);
        } finally {
            btn.disabled = false; btn.textContent = 'Войти';
        }
    }

    async function doRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pass = document.getElementById('reg-password').value;
        const btn = document.getElementById('btn-register');
        btn.disabled = true; btn.textContent = 'Создаём…';
        try {
            const d = await api('POST', '/auth/register', { username, email, password: pass }, false);
            token = d.token;
            localStorage.setItem('token', token)
            afterLogin();
        } catch(e) {
            showAuthError(e.message);
        } finally {
            btn.disabled = false; btn.textContent = 'Создать аккаунт';
        }
    }

    async function getMe() {
        try {
            const d = await api('GET', '/users/me');
            myUsername = d.username;
            myUserId = d.id;
            return true;
        } catch(e) {
            return false;
        }
    }

    function showAuthError(msg) {
        const el = document.getElementById('auth-error');
        el.textContent = msg;
        el.classList.add('visible');
    }

    function afterLogin() {
        getMe().then(success => {
            if (success) {
                document.getElementById('display-username').textContent = myUsername;
                document.getElementById('lobby-username').textContent = myUsername;
                connectSocket();
                showScreen('matches');
                loadMatches();
            } else {
                token = null
                localStorage.removeItem('token')
                toast("Login unsuccesfull!")
            }
        }).catch(error => {
            console.log(error)
            token = null
            localStorage.removeItem('token')
            toast("Login unsuccesfull!")
        });
    }

    function doLogout() {
        if (socket) { socket.close(); socket = null; }
        localStorage.removeItem('token')
        location.reload();
    }

    // ── WebSocket ──────────────────────────────────────────────────
    function connectSocket() {
        if (socket) socket.close();
        socket = new WebSocket(`ws://${BASE}/ws?token=${token}`);

        socket.onopen = () => {
            document.querySelectorAll('.ws-dot').forEach(d => d.classList.add('connected'));
            document.getElementById('g-ws').textContent = '● Online';
            document.getElementById('g-ws').style.color = 'var(--success)';
        };

        socket.onclose = () => {
            document.querySelectorAll('.ws-dot').forEach(d => d.classList.remove('connected'));
            document.getElementById('g-ws').textContent = '● Offline';
            document.getElementById('g-ws').style.color = 'var(--danger)';
        };

        socket.onmessage = (ev) => {
            const data = JSON.parse(ev.data);
            handleWsMessage(data);
        };
    }

    function handleWsMessage(data) {
        switch (data.type) {
            case 'match_tick':
                document.getElementById('g-tps').textContent = data.payload.current_tps;
                gameState = data.payload.world;
                renderGame();
                break;

            case 'match_lobby_join':
                logEvent(`${data.player_username} вошёл в лобби матча #${data.match_id}`, 'var(--success)');
                addLobbyLog(`${data.player_username} присоединился`, 'log-join');
                if (!currentLobbyPlayers.find(p => p.id === data.player_id)) {
                    currentLobbyPlayers.push({ id: data.player_id, username: data.player_username });
                    renderLobbyPlayers();
                }
                toast(`${data.player_username} вошёл в лобби`, 'info');
                break;

            case 'match_lobby_leave':
                logEvent(`${data.player_username} покинул лобби матча #${data.match_id}`, 'var(--warning)');
                addLobbyLog(`${data.player_username} вышел`, 'log-leave');
                currentLobbyPlayers = currentLobbyPlayers.filter(p => p.id !== data.player_id);
                renderLobbyPlayers();
                toast(`${data.player_username} покинул лобби`, 'warning');
                break;

            case 'match_started':
                logEvent(`Матч #${data.match_id} начался!`, 'var(--success)');
                toast('Матч начался!', 'success');
                showScreen('game');
                document.getElementById('g-match-id').textContent = data.match_id;
                hideGameOverlay();
                break;

            case 'match_ended':
                logEvent(`Матч #${data.match_id} завершён`, 'var(--muted)');
                toast('Матч завершён', 'info');
                showGameOverlay('Матч завершён', `Матч #${data.match_id} окончен`);
                break;

            case 'player_disconnected':
                logEvent(`Игрок #${data.player_id} отключился от матча #${data.match_id}`, 'var(--danger)');
                toast(`Игрок отключился`, 'warning');
                break;

            case 'player_reconnected':
                logEvent(`Игрок #${data.player_id} переподключился к матчу #${data.match_id}`, 'var(--success)');
                toast(`Игрок переподключился`, 'info');
                break;

            default:
                console.log('WS:', data);
        }
    }

    function sendAction(msg) {
        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify(msg));
        } else {
            toast('WebSocket не подключён', 'error');
        }
    }

    // ── Matches ────────────────────────────────────────────────────
    async function loadMatches() {
        const list = document.getElementById('matches-list');
        list.innerHTML = '<div class="empty-state">Загрузка…</div>';
        try {
            const matches = await api('GET', '/matches');
            renderMatchList(matches || []);
        } catch(e) {
            list.innerHTML = `<div class="empty-state" style="color:var(--danger)">Ошибка: ${e.message}</div>`;
        }
    }

    function renderMatchList(matches) {
        const list = document.getElementById('matches-list');
        if (!matches.length) {
            list.innerHTML = '<div class="empty-state">Нет доступных матчей.<br>Создайте первый!</div>';
            return;
        }
        list.innerHTML = '';
        matches.forEach(m => {
            if (m.status === 'in_match_lobby') {
                doReJoinMatchLobby(m.id, m.players)
            }
            const card = document.createElement('div');
            card.className = `match-card lobby`;
            card.innerHTML = `
                <div class="match-info">
                    <div class="match-name">Матч #${m.id}</div>
                    <div class="match-meta">
                        <span class="badge badge-lobby">Лобби</span>
                        ${m.players.length}/${m.max_players} игрок(а)
                        ${m.created_at ? `· ${new Date(m.created_at).toLocaleString('ru')}` : ''}
                    </div>
                </div>
                <div class="match-actions">
                    ${m.status == 'in_match' ? `<button class="btn btn-success" onclick="doRejoinMatch(${m.id})">Переподключиться</button>` : ''}
                    ${m.status == 'idle_match' ? `<button class="btn btn-primary" onclick="doJoinMatchLobby(${m.id})">Войти</button>` : ''}
                    ${m.status == 'active_match' ? '' : ''}
                </div>
            `;
            list.appendChild(card);
        });
    }

    async function doCreateMatch() {
        try {
            const m = await api('POST', '/matches', {});
            toast(`Матч #${m.id} создан`, 'success');
            loadMatches();
            doJoinMatchLobby(m.id);
        } catch(e) {
            toast(`Ошибка создания: ${e.message}`, 'error');
        }
    }

    async function toMatchLobby(matchId) {
        try {
            const players = await api('GET', `/matches/${matchId}/lobby`);
            currentMatchId = matchId;
            currentLobbyPlayers = players || [];
            document.getElementById('lobby-match-id').textContent = `#${matchId}`;
            document.getElementById('lobby-log').innerHTML = '';
            renderLobbyPlayers();
            addLobbyLog('Вы вошли в лобби', 'log-join');
            showScreen('lobby');
        } catch(e) {
            toast(`Ошибка входа: ${e.message}`, 'error');
        }
    }

    async function doJoinMatchLobby(matchId) {
        try {
            const players = await api('POST', `/matches/${matchId}/lobby/join`, {});
            currentMatchId = matchId;
            currentLobbyPlayers = players || [];
            document.getElementById('lobby-match-id').textContent = `#${matchId}`;
            document.getElementById('lobby-log').innerHTML = '';
            renderLobbyPlayers();
            addLobbyLog('Вы вошли в лобби', 'log-join');
            showScreen('lobby');
        } catch(e) {
            toast(`Ошибка входа: ${e.message}`, 'error');
        }
    }

    async function doReJoinMatchLobby(matchId, players) {
        try {
            currentMatchId = matchId;
            currentLobbyPlayers = players || [];
            document.getElementById('lobby-match-id').textContent = `#${matchId}`;
            document.getElementById('lobby-log').innerHTML = '';
            renderLobbyPlayers();
            addLobbyLog('Вы вошли в лобби', 'log-join');
            showScreen('lobby');
        } catch(e) {
            toast(`Ошибка входа: ${e.message}`, 'error');
        }
    }

    async function doRejoinMatch(matchId) {
        currentMatchId = matchId;
        document.getElementById('g-match-id').textContent = matchId;
        showScreen('game');
        hideGameOverlay();
        toast(`Переподключение к матчу #${matchId}`, 'info');
    }

    async function doStartMatch() {
        const btn = document.getElementById('btn-start');
        btn.disabled = true; btn.textContent = 'Запуск…';
        try {
            await api('POST', `/matches/${currentMatchId}/start`, {});
            // match_started придёт по WebSocket
        } catch(e) {
            toast(`Ошибка старта: ${e.message}`, 'error');
            btn.disabled = false; btn.textContent = '▶ Начать матч';
        }
    }

    async function doLeaveMatchLobby() {
        try {
            await api('POST', `/matches/${currentMatchId}/lobby/leave`, {}).catch(() => {});
        } finally {
            currentMatchId = null;
            currentLobbyPlayers = [];
            showScreen('matches');
            loadMatches();
        }
    }

    function renderLobbyPlayers() {
        const list = document.getElementById('players-list');
        if (!currentLobbyPlayers.length) {
            list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:10px 0;">Пусто</div>';
            return;
        }
        list.innerHTML = currentLobbyPlayers.map(p => `
            <div class="player-row">
                <div class="avatar">${(p.username || 'U').slice(0,2).toUpperCase()}</div>
                <div class="player-name">${p.username}</div>
                ${p.id === myUserId ? '<span class="player-you">Вы</span>' : ''}
            </div>
        `).join('');
    }

    function goToMatches() {
        showScreen('matches');
        loadMatches();
    }

    // ── Game ───────────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const NODE_RADIUS = 30;
    const SCALE = 200;
    const OFFSET = 100;

    function getCanvasCoords(x, y) {
        return { x: x * SCALE + OFFSET, y: y * SCALE + OFFSET };
    }

    function renderGame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        gameState.node_edges.forEach(edge => {
            const n1 = gameState.nodes[edge.n1_id];
            const n2 = gameState.nodes[edge.n2_id];
            if (!n1 || !n2) return;
            const p1 = getCanvasCoords(n1.pos_x, n1.pos_y);
            const p2 = getCanvasCoords(n2.pos_x, n2.pos_y);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
            edge.armies.forEach(army => drawArmy(army, p1, p2));
        });

        Object.values(gameState.nodes).forEach(node => {
            const p = getCanvasCoords(node.pos_x, node.pos_y);
            ctx.fillStyle = node.owner_id === 1 ? '#3498db' : (node.owner_id === 0 ? '#666' : '#e74c3c');
            ctx.beginPath();
            ctx.arc(p.x, p.y, NODE_RADIUS, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = node.type === 0 ? '#fff' : '#ffa500';
            ctx.lineWidth = node.is_always_send_army ? 4 : 1;
            ctx.stroke();
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(node.value, p.x, p.y + 5);
            ctx.font = '10px Arial';
            ctx.fillText(`SHD:${node.shield}`, p.x, p.y + 20);
            ctx.fillStyle = '#aaa';
            ctx.fillText(`#${node.id}`, p.x, p.y - 18);
        });
    }

    function drawArmy(army) {
        const s = gameState.nodes[army.heading_from_id];
        const e = gameState.nodes[army.heading_to_id];
        if (!s || !e) return;
        const dx = e.pos_x - s.pos_x, dy = e.pos_y - s.pos_y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        let progress = dist > 0 ? Math.min(Math.max((army.pos / 10000) / dist, 0), 1) : 0;
        const sP = getCanvasCoords(s.pos_x, s.pos_y);
        const eP = getCanvasCoords(e.pos_x, e.pos_y);
        const cx = sP.x + (eP.x - sP.x) * progress;
        const cy = sP.y + (eP.y - sP.y) * progress;
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(cx, cy, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(army.value, cx, cy + 3);
    }

    function gChangeType(t) {
        sendAction({ type: 'update_node_type_action', payload: { node_id: parseInt(document.getElementById('g-node-id').value), new_type: t } });
    }
    function gDispatch() {
        sendAction({ type: 'send_army_action', payload: { heading_from_id: parseInt(document.getElementById('g-node-id').value), heading_to_id: parseInt(document.getElementById('g-target-id').value), value: 10 } });
    }
    function gAlways(m) {
        sendAction({ type: 'set_always_send_army_action', payload: { from_node_id: parseInt(document.getElementById('g-node-id').value), to_node_id: parseInt(document.getElementById('g-target-id').value), mode: m } });
    }

    function showGameOverlay(title, sub) {
        document.getElementById('game-overlay-title').textContent = title;
        document.getElementById('game-overlay-sub').textContent = sub;
        document.getElementById('game-overlay').classList.add('visible');
    }
    function hideGameOverlay() {
        document.getElementById('game-overlay').classList.remove('visible');
    }

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        renderGame();
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);
</script>
