syntax = "proto3";

package world;
import "game/world/nodes/nodes.proto";

option go_package = "OnlineGame/pkg/pb/go/game/world";

message World {
  uint32 min_players = 1;
  uint32 max_players = 2;
  repeated nodes.Node players_start_nodes = 3;
  map<uint32, nodes.Node> nodes = 4;
  repeated nodes.NodeEdge node_edges = 5;
}